function toggleTheme(){var t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('sn25-theme',t)}
const usdC=n=>{const a=Math.abs(n);return (a>=1e6?'$'+(a/1e6).toFixed(2)+'M':a>=1e3?'$'+(a/1e3).toFixed(1)+'k':'$'+a.toFixed(0))};
const usdP=n=>'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:n<10?4:0});
const num=(n,d=0)=>Number(n).toLocaleString('en-US',{maximumFractionDigits:d});
const pct=n=>{const s=n>=0?'+':'';return `<span class="${n>=0?'up':'down'}">${s}${n.toFixed(1)}%</span>`};
const shortA=a=>a.slice(0,6)+'…'+a.slice(-4);
const HL={green:'g',purple:'p',gold:'gold'};
function toggle(id){document.getElementById(id).classList.toggle('open')}

function rankStrip(d){
  const lb=d.leaderboard, r=lb.sn25_rank, tot=lb.total;
  const W=700,H=64,x0=40,x1=W-40,y=34;
  const X=rank=>x0+(rank-1)/(tot-1)*(x1-x0);
  const comps=(lb.rows||[]).filter(z=>z.is_target);
  let ticks='';
  comps.forEach(z=>{const x=X(z.rank);ticks+=`<circle cx="${x.toFixed(1)}" cy="${y}" r="3.5" fill="var(--gold)"><title>${z.name} SN${z.netuid} — #${z.rank}</title></circle><text x="${x.toFixed(1)}" y="${y-9}" text-anchor="middle" font-size="8" fill="var(--gold)">SN${z.netuid}</text>`;});
  const mx=X(r);
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="var(--border-hover)" stroke-width="3" stroke-linecap="round"/>
    <line x1="${x0}" y1="${y}" x2="${mx.toFixed(1)}" y2="${y}" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    ${ticks}
    <circle cx="${mx.toFixed(1)}" cy="${y}" r="7" fill="var(--accent)"/>
    <text x="${mx.toFixed(1)}" y="${y+22}" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">SN118 · #${r}</text>
    <text x="${x0}" y="${y-9}" font-size="8" fill="var(--text-muted)">#1 best</text>
    <text x="${x1}" y="${y-9}" text-anchor="end" font-size="8" fill="var(--text-muted)">#${tot}</text>
  </svg>`;
}

function render(d,live){
  const s=d.subnet,e=d.emissions,c=d.conviction||{},lb=d.leaderboard;
  const conc=d.holders.reduce((a,h)=>a+h.share_pct,0);
  const dot=document.getElementById('dot'),st=document.getElementById('statusTxt');
  const t=new Date(d.generated_at).toISOString().replace('T',' ').replace(/:\d\dZ/,'Z');
  dot.className='dot'+(live?'':' snap'); st.textContent=(live?'LIVE · ':'SNAPSHOT · ')+t;

  document.getElementById('verdict').innerHTML=`Mid-tier subnet — <b>#${lb.sn25_rank} of ${lb.total}</b> by price/FDV, <b>${usdC(s.market_cap_usd)}</b> cap. It emits <b>~${num(e.total.tao_day/s.price_tao,0)} α/day</b> of its own token (worth ~${usdC(e.total.usd_day)}); ${c.available?`<b>${(c.pct_of_circulating||0).toFixed(1)}%</b> of supply is conviction-locked`:`conviction data is refreshing`}, and the top-25 wallets hold <b>${conc.toFixed(0)}%</b>.`;

  document.getElementById('kpis').innerHTML=[
    ['Alpha price', usdP(s.price_usd), pct(s.change_24h_pct)+' · 24h'],
    ['Market cap', usdC(s.market_cap_usd), '#'+lb.sn25_rank+' of '+lb.total+' subnets'],
    ['Emissions', num(e.total.tao_day/s.price_tao,0)+'<span style="font-size:.9rem;color:var(--text-muted)"> α/day</span>', 'SN118 token (~'+usdC(e.total.usd_day)+'/day) · no TAO to holders'],
  ].map(k=>`<div class="kpi"><div class="k">${k[0]}</div><div class="v">${k[1]}</div><div class="s">${k[2]}</div></div>`).join('');

  document.getElementById('rankso').textContent='by alpha price / FDV · gold = tracked comps';
  document.getElementById('rankstrip').innerHTML=rankStrip(d);

  // one-liner rows
  const ownP=e.owner.usd_day/e.total.usd_day*100, valP=e.validator.usd_day/e.total.usd_day*100;
  const top=(c.top||[]).slice(0,4);
  const hmap={}; d.holders.forEach(h=>hmap[h.coldkey]=h);
  const convPos=top.map(p=>{const h=hmap[p.coldkey]||{};const cls=h.hl?('pill '+(HL[h.hl]||'')):'pill';return `<span class="${cls}">${h.label||shortA(p.coldkey)} · ${num(p.alpha,0)} α</span>`}).join(' ');
  const top3=d.holders.slice(0,3).map(h=>{const cls=h.hl?('pill '+(HL[h.hl]||'')):'pill';return `<span class="${cls}">#${h.rank} ${h.label||shortA(h.coldkey)} · ${usdC(h.usd)}</span>`}).join(' ');

  document.getElementById('rows').innerHTML=`
  <div class="row"><div class="top"><div><div class="lbl">Emissions (SN118 token)</div><div class="line">≈ <b>${num(e.total.tao_day/s.price_tao,0)} α/day</b> of the subnet token (~${usdC(e.total.usd_day)}) → owner 18% · validators 41% · miner 41% <span class="down">burned</span></div></div><span class="tog" onclick="toggle('drwE')">detail ▾</span></div>
    <div class="so">Owner receives ~${num(e.owner.tao_day/s.price_tao,0)} α/day (~${usdC(e.owner.usd_day)}); paid in alpha, not TAO. TAO only enters the pool when alpha is bought.</div>
    <div class="drawer" id="drwE"><table class="mtable"><thead><tr><th>Key</th><th>α/day</th><th>USD/day</th><th>USD/yr</th></tr></thead><tbody>
    ${[['Owner',e.owner],['Validators',e.validator],['Miner (burned)',e.miner]].map(x=>`<tr><td>${x[0]}</td><td class="mono">${num(x[1].tao_day/s.price_tao,0)}</td><td class="mono">${usdC(x[1].usd_day)}</td><td class="mono">${usdC(x[1].usd_day*365)}</td></tr>`).join('')}
    </tbody></table></div></div>

  ${c.available ? `<div class="row"><div class="top"><div><div class="lbl">Bittensor Conviction${c.stale?' <span style="color:var(--amber)">· last known</span>':''}</div><div class="line"><b>${(c.pct_of_circulating||0).toFixed(1)}%</b> of circulating α conviction-locked · ${c.lock_count||0} position${c.lock_count===1?'':'s'}</div></div><span class="tog" onclick="toggle('drwC')">positions ▾</span></div>
    <div class="so">${num(c.locked_alpha||0,0)} α locked (${usdC(c.locked_usd||0)}) — dominated by ${(top[0]&&(hmap[top[0].coldkey]||{}).label)||'one wallet'}.</div>
    <div class="drawer" id="drwC">${convPos||'—'}</div></div>`
  : `<div class="row"><div class="lbl">Bittensor Conviction</div><div class="line" style="color:var(--text-muted)">Awaiting data — the last refresh couldn't reach taostats. Press ↻ to retry.</div></div>`}

  <div class="row"><div class="top"><div><div class="lbl">Holder concentration</div><div class="line">Top-25 wallets hold <b>${conc.toFixed(0)}%</b> of supply · ${num(s.holder_count)} holders total</div></div><a class="tog" href="wallets.html">See all 25 →</a></div>
    <div class="so">Largest: ${top3}</div></div>`;

  // details disclosure
  const nb=d.network;
  document.getElementById('details').innerHTML=`
  <h4>Pool &amp; network</h4>
  <div class="kv"><span class="k">Alpha in pool</span><span class="mono">${num(s.alpha_in_pool,0)} α</span></div>
  <div class="kv"><span class="k">TAO reserve</span><span class="mono">${num(s.tao_in_pool,0)} τ · ${usdC(s.tao_in_pool*d.tao.price_usd)}</span></div>
  <div class="kv"><span class="k">24h volume</span><span class="mono">${usdC(s.volume_24h_usd)}</span></div>
  <div class="kv"><span class="k">FDV</span><span class="mono">${usdC(s.fdv_usd)}</span></div>
  <div class="kv"><span class="k">Network stake split</span><span class="mono">${nb.staked_root_pct.toFixed(0)}% root / ${nb.staked_alpha_pct.toFixed(0)}% alpha</span></div>
  <h4>Top validators</h4>
  <table class="mtable"><thead><tr><th>Validator</th><th>Stake α</th><th>Dominance</th><th>APR</th></tr></thead><tbody>
  ${d.validators.slice(0,6).map(v=>`<tr><td>${v.name}</td><td class="mono">${num(v.stake_alpha,0)}</td><td class="mono">${v.dominance_pct.toFixed(1)}%</td><td class="mono up">${v.apr_pct.toFixed(0)}%</td></tr>`).join('')}
  </tbody></table>
  <h4>Rank neighbourhood</h4>
  <table class="mtable"><thead><tr><th>Rank</th><th>Subnet</th><th>Market cap</th><th>7d</th></tr></thead><tbody>
  ${lb.rows.map(r=>`<tr style="${r.is_sn25?'background:var(--accent-dim)':''}"><td class="mono">#${r.rank}</td><td>${r.name} <span style="color:var(--text-muted)">SN${r.netuid}</span>${r.is_target&&!r.is_sn25?' <span class="pill gold">comp</span>':''}</td><td class="mono">${usdC(r.mcap_usd)}</td><td class="mono">${pct(r.change_7d)}</td></tr>`).join('')}
  </tbody></table>`;
}
function manualRefresh(){var s=document.getElementById('statusTxt');if(s)s.textContent='refreshing…';loadData();}
function loadData(){try{if(typeof fetch!=='function'){render(FALLBACK,false);return;}fetch('./data.json?t='+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json()}).then(d=>render(d,true)).catch(()=>render(FALLBACK,false));}catch(e){render(FALLBACK,false);}}
loadData();
</script>
