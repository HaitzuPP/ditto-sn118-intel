name: refresh-data
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh data.json
        env:
          TAO_KEY: ${{ secrets.TAO_KEY }}
          TAO_SECRET: ${{ secrets.TAO_SECRET }}
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
        run: python3 refresh.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json holders_seen.json holders_entry.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: refresh SN118 data $(date -u +%FT%TZ)"
          git push
